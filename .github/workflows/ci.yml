name: CI-CD to AKS

on:
  push:
    branches:
      - main

env:
  ACR_NAME: nandhuacr123
  IMAGE_NAME: devops-demo
  AKS_CLUSTER: devops-aks
  RESOURCE_GROUP: DevOps-demo

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Login to ACR
      run: az acr login --name $ACR_NAME

    - name: Build Docker Image
      run: docker build -t $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }} .

    - name: Push Docker Image
      run: docker push $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}

    - name: Get AKS Credentials
      run: |
        az aks get-credentials --resource-group $RESOURCE_GROUP --name $AKS_CLUSTER --overwrite-existing

    - name: Deploy to AKS
      run: |
        kubectl apply -f k8s/deployment.yaml
        kubectl set image deployment/devops-demo devops-demo=$ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}
